<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Picazo — Sketch It. Guess It. Win It.</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Righteous&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div id="screen-lobby" class="screen active">
    <div class="lobby-card glass-strong">
      <div class="lobby-header">
        <h1 class="logo-text">Picazo</h1>
        <p class="tagline">Sketch It. Guess It. Win It.</p>
      </div>

      <div class="section-block">
        <div class="avatar-picker">
          <button class="av-arrow" id="btn-av-prev">&#8249;</button>
          <div class="av-frame glass" id="av-frame"><canvas id="av-canvas" width="96" height="96"></canvas></div>
          <button class="av-arrow" id="btn-av-next">&#8250;</button>
        </div>
        <div class="av-dots" id="av-dots"></div>
      </div>

      <div class="section-block">
        <input type="text" id="inp-name" class="text-input" placeholder="Drop your name, legend." maxlength="18" autocomplete="off" spellcheck="false" />
      </div>

      <div class="cta-stack">
        <button class="btn-primary glow-shake" id="btn-play">▶ Play Now</button>
        <button class="btn-secondary glow-shake" id="btn-private">Create Private Room</button>
      </div>
    </div>
  </div>

  <div id="modal-private" class="modal-overlay hidden">
    <div class="modal-content glass-strong">
      <h2>Room Settings</h2>
      <div class="settings-grid">
        <div class="setting-group"><label>Rounds</label><select id="sel-rounds" class="select-input"><option value="3" selected>3</option><option value="5">5</option><option value="8">8</option></select></div>
        <div class="setting-group"><label>Players</label><select id="sel-bots" class="select-input"><option value="2">2</option><option value="4">4</option><option value="8" selected>8</option></select></div>
        <div class="setting-group"><label>Draw Time</label><select id="sel-time" class="select-input"><option value="60">60s</option><option value="100" selected>100s</option><option value="120">120s</option></select></div>
        <div class="setting-group"><label>Hints</label><select id="sel-hints" class="select-input"><option value="low">Low</option><option value="normal" selected>Normal</option><option value="high">High</option></select></div>
      </div>
      <div class="setting-group full">
        <label>Custom Words (comma separated)</label>
        <textarea class="text-input" rows="2" placeholder="e.g. pikachu, lightsaber..."></textarea>
      </div>
      <button class="btn-primary glow-shake" id="btn-generate-link">Generate & Start</button>
      <button class="btn-text" id="btn-close-modal">Cancel</button>
    </div>
  </div>

  <div id="screen-game" class="screen">
    
    <div class="grid-top">
      <header class="game-header glass">
        <div class="hdr-timer-zone">
          <div class="timer-ring-wrap">
            <svg class="timer-svg" viewBox="0 0 60 60"><circle class="t-bg" cx="30" cy="30" r="25"/><circle class="t-fg" id="t-fg" cx="30" cy="30" r="25" stroke-dasharray="157.08"/></svg>
            <span class="timer-num" id="timer-num">100</span>
          </div>
          <span class="round-badge" id="round-badge">Round 1/3</span>
        </div>
        
        <div class="hdr-word-zone">
          <div class="word-display" id="word-display"></div>
          <div class="word-meta" id="word-meta"></div>
        </div>
        
        <div class="hdr-right"><button class="icon-btn" id="btn-mute">🔊</button></div>
      </header>

      <div class="canvas-wrap glass" id="canvas-wrap">
        <canvas id="game-canvas"></canvas>
        <div class="rating-ui glass">
          <button class="rate-btn">👍</button>
          <button class="rate-btn">👎</button>
        </div>

        <div class="overlay waiting-overlay glass hidden" id="overlay-waiting">
          <div class="overlay-inner"><div class="wait-spinner">⏳</div><h3>Waiting for players...</h3></div>
        </div>
        <div class="overlay word-select-overlay hidden" id="overlay-word-select">
          <div class="ws-inner">
            <div class="ws-header"><h2>Choose a word!</h2><p><span id="ws-timer">15</span>s</p></div>
            <div class="ws-cards" id="ws-cards"></div>
          </div>
        </div>
        <div class="overlay round-end-overlay hidden" id="overlay-round-end">
          <div class="re-inner glass-strong">
            <h2 id="re-title">Round Over!</h2><p>The word was: <strong id="re-word-val">—</strong></p>
            <div class="re-scores" id="re-scores"></div><div id="re-countdown">5</div>
          </div>
        </div>
      </div>

      <div class="toolbar glass" id="toolbar">
        <button class="tool-btn active" id="tool-pencil" data-tool="pencil">✏️</button>
        
        <div class="tool-popup-wrap">
          <button class="tool-btn" id="btn-color-popup"><div class="color-indicator" id="color-indicator" style="background:#000;"></div></button>
          <div class="tool-popup glass-strong hidden" id="popup-color">
            <div class="color-grid" id="color-palette"></div>
            <input type="color" id="color-picker" value="#000000" />
          </div>
        </div>
        
        <div class="tool-popup-wrap">
          <button class="tool-btn" id="btn-size-popup">⭕</button>
          <div class="tool-popup glass-strong hidden" id="popup-size">
            <span class="size-label" id="size-val-txt">3px</span>
            <input type="range" class="size-slider" id="size-slider" min="1" max="40" value="3" />
          </div>
        </div>
        
        <button class="tool-btn" id="tool-fill" data-tool="fill">🪣</button>
        <button class="tool-btn" id="tool-eraser" data-tool="eraser">🧽</button>
        <button class="tool-btn" id="tool-undo">↩️</button>
        <button class="tool-btn" id="tool-clear">🗑️</button>
      </div>
    </div>

    <div class="grid-middle">
      <aside class="panel leaderboard-panel glass" id="leaderboard-panel">
        <ul class="player-list" id="player-list"></ul>
      </aside>
      <aside class="panel chat-panel glass" id="chat-panel">
        <div class="chat-messages" id="chat-messages"></div>
      </aside>
    </div>

    <div class="grid-bottom">
      <div class="footer-input-wrap glass-strong">
        <input type="text" id="chat-input" class="chat-input" placeholder="Type your guess..." autocomplete="off" spellcheck="false" />
      </div>
    </div>

  </div>

  <div class="toast-container" id="toast-container"></div>
  
  <div class="context-menu glass-strong hidden" id="context-menu">
    <div class="ctx-head" id="ctx-head"><div class="ctx-av" id="ctx-av"></div><div><div class="ctx-name" id="ctx-name">Player</div></div></div>
    <button class="ctx-btn ctx-danger" id="ctx-kick">Kick Player</button>
    <button class="ctx-btn" id="ctx-mute">Mute</button>
    <button class="ctx-btn ctx-close" id="ctx-close">Cancel</button>
  </div>
  
  <div class="overlay podium-overlay hidden" id="overlay-podium">
    <div class="podium-inner glass-strong">
      <h2>Game Over!</h2>
      <div class="podium-stand" id="podium-stand"></div>
      <button class="btn-primary glow-shake" onclick="location.reload()" style="margin-top: 15px;">Play Again</button>
    </div>
  </div>

  <canvas id="confetti-canvas"></canvas>

  <script src="script.js"></script>
</body>
</html>
